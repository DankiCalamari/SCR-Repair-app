<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 48" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  
  <!-- Hand-drawn style wrench/screwdriver icon -->
  <g transform="translate(4, 8)">
    <!-- Screwdriver handle -->
    <rect x="4" y="20" width="8" height="6" rx="1" fill="#92400e"/>
    <!-- Screwdriver tip -->
    <path d="M4 20 L0 24 L4 28 Z" fill="#d97706"/>
    <!-- Wrench -->
    <path d="M12 12 L24 24 L28 20 L16 8 Z" fill="url(#logoGrad)"/>
    <circle cx="16" cy="14" r="2" fill="#fff" opacity="0.6"/>
  </g>
  
  <!-- Text: SUNSET COUNTRY -->
  <text x="36" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="700" fill="#292524" letter-spacing="0.5" style="font-variant: small-caps;">SUNSET COUNTRY</text>
  
  <!-- Text: REPAIRS -->
  <text x="36" y="38" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="800" fill="#c2410c" letter-spacing="1">REPAIRS</text>
</svg>