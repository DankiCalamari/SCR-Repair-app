<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <defs>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="rayGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Sun circle -->
  <circle cx="24" cy="24" r="14" fill="url(#sunGrad)"/>
  <!-- Sun inner highlight -->
  <circle cx="24" cy="22" r="5" fill="#fff" opacity="0.85"/>

  <!-- Sun rays -->
  <g opacity="0.6">
    <line x1="24" y1="6" x2="24" y2="10" stroke="url(#rayGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="38" x2="24" y2="42" stroke="url(#rayGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="6" y1="24" x2="10" y2="24" stroke="url(#rayGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="38" y1="24" x2="42" y2="24" stroke="url(#rayGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="11.3" y1="11.3" x2="14.1" y2="14.1" stroke="url(#rayGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="33.9" y1="33.9" x2="36.7" y2="36.7" stroke="url(#rayGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="11.3" y1="36.7" x2="14.1" y2="33.9" stroke="url(#rayGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="33.9" y1="14.1" x2="36.7" y2="11.3" stroke="url(#rayGrad)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Horizon line under sun -->
  <rect x="8" y="40" width="32" height="1.5" rx="0.75" fill="#f59e0b" opacity="0.3"/>

  <!-- Text: SUNSET -->
  <text x="52" y="26" font-family="Exo 2, Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#1c1917" letter-spacing="1.5">SUNSET</text>

  <!-- Text: COUNTRY REPAIRS -->
  <text x="52" y="40" font-family="Exo 2, Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#78716c" letter-spacing="2.5">COUNTRY REPAIRS</text>
</svg>
